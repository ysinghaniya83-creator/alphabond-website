    <script type="application/ld+json">
    {

        {
          "@type": "Question",
          "name": "What does Alphabond manufacture?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Alphabond (a brand of Kishan Enterprise) manufactures wet sand, dry sand, and a full range of construction chemicals from an ISO 9001:2015 certified facility in Bharuch, Gujarat. The chemical range includes Tile Adhesives (TileGrip X1–X4), Structural Precision Grouts (AlphaGrout X1 & X2), AAC Block Jointing Mortar (BlockGrip X), and Ready-Mix Plaster / Bonding Agent (PlastoGrip X)."
          }
        },
        {
          "@type": "Question",
          "name": "Which TileGrip grade should I use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "TileGrip X1 is for standard ceramic tiles indoors. X2 handles large-format vitrified, porcelain, and natural stone for indoor/outdoor use. X3 is premium-grade for granite, marble, and large-format tiles in high-traffic and demanding exteriors. X4 is the extra-strength grade for heavy stone cladding, façades, and challenging industrial/exterior applications."
          }
        },
        {
          "@type": "Question",
          "name": "What is AlphaGrout used for? Is it a tile grout or a structural grout?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "AlphaGrout X1 and X2 are high-performance structural precision grouts, not tile grouts. They are cement-based, non-shrink, polymer-enriched grouts engineered for machine foundation grouting, column joints, structural anchor bolts, and base plates of turbines, compressors, and heavy industrial machinery. AlphaGrout X1 achieves >45 N/mm² compressive strength at 28 days. AlphaGrout X2 delivers >65 N/mm² at 28 days and accepts coarse aggregates up to 20 mm for large-volume pours."
          }
        },
        {
          "@type": "Question",
          "name": "Does Alphabond offer job work or contract manufacturing?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Alphabond manufactures tile adhesives, block adhesives, grouts, and specialty compounds under third-party brand names. Custom formulations, batch QC documentation, and branded packaging are available. Contact us to discuss your requirements."
          }
        },
        {
          "@type": "Question",
          "name": "What is Alphabond's production capacity?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Dry sand: 8,000–9,000 MT per month. Construction chemicals: 1.5 lakh bags per month currently. A second production unit under construction in Bharuch will expand chemical capacity to over 5 lakh bags per month."
          }
        },
        {
          "@type": "Question",
          "name": "How do I get Technical Data Sheets for Alphabond products?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Contact Alphabond via the enquiry form on the website or call directly. Technical Data Sheets (TDS) for any product or grade are sent the same business day. For large project specifications, the technical team can provide a project-specific product selection guide."
          }
        }
      ]
    }
    </script>
